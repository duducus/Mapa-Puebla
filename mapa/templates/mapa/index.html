<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Puebla - Distritos Electorales</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      min-height:100vh;
      font-family:"Segoe UI",system-ui,sans-serif;
      background:#eef1f5;
      color:#1f2933;
      overflow:hidden;
    }
    #app {
      height:100vh;
      display:grid;
      grid-template-columns:minmax(340px, 410px) 1fr;
    }
    #sidebar {
      display:flex;
      flex-direction:column;
      background:#f8fafc;
      border-right:1px solid #d8dee8;
      min-width:0;
      overflow:hidden;
    }
    #hdr {
      padding:18px 20px 14px;
      background:#ffffff;
      border-bottom:1px solid #d8dee8;
    }
    #hdr h1 {
      font-size:1rem;
      line-height:1.25;
      font-weight:800;
      color:#17202a;
      letter-spacing:0;
    }
    #hdr p {
      margin-top:4px;
      color:#667085;
      font-size:.76rem;
    }
    #district-panel {
      flex:1;
      overflow-y:auto;
      padding:16px 18px;
    }
    #zone-overview {
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
      margin-bottom:14px;
    }
    .zone-card {
      width:100%;
      display:grid;
      grid-template-columns:8px 1fr auto;
      align-items:center;
      gap:10px;
      min-height:54px;
      border:1px solid #d8dee8;
      border-radius:8px;
      background:#ffffff;
      color:#344054;
      text-align:left;
      cursor:pointer;
      overflow:hidden;
      box-shadow:0 6px 16px rgba(16,24,40,.05);
      transition:border-color .14s, box-shadow .14s, transform .14s;
    }
    .zone-card:hover,
    .zone-card.active {
      border-color:var(--zc);
      box-shadow:0 10px 22px rgba(16,24,40,.1);
      transform:translateY(-1px);
    }
    .zone-card.active { background:#fff; }
    .zone-swatch {
      width:8px;
      height:100%;
      background:var(--zc);
    }
    .zone-card-main { min-width:0; padding:9px 0; }
    .zone-name {
      font-size:.86rem;
      font-weight:850;
      color:#17202a;
      overflow-wrap:anywhere;
    }
    .zone-districts {
      margin-top:2px;
      font-size:.68rem;
      color:#667085;
      line-height:1.3;
    }
    .zone-total {
      margin-right:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-width:34px;
      height:28px;
      border-radius:999px;
      background:#eef2f7;
      color:#44515f;
      font-size:.74rem;
      font-weight:850;
    }
    .label {
      font-size:.62rem;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#7a8494;
    }
    #district-hero {
      background:#ffffff;
      border:1px solid #d8dee8;
      border-radius:8px;
      overflow:hidden;
      box-shadow:0 10px 24px rgba(16,24,40,.07);
    }
    #district-image-wrap {
      aspect-ratio:16 / 10;
      background:#e5eaf1;
      border-bottom:1px solid #d8dee8;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    #district-image {
      width:100%;
      height:100%;
      object-fit:contain;
      display:none;
      background:#fff;
    }
    #image-empty {
      color:#8a94a6;
      font-size:.82rem;
      padding:18px;
      text-align:center;
    }
    #district-copy { padding:16px; }
    #district-meta {
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
      min-width:0;
    }
    #badge {
      width:42px;
      height:42px;
      border-radius:50%;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1rem;
      font-weight:900;
      color:#fff;
      background:#8a94a6;
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.4);
    }
    #district-title {
      font-size:1.08rem;
      line-height:1.2;
      font-weight:800;
      color:#17202a;
      overflow-wrap:anywhere;
    }
    #district-subtitle {
      margin-top:2px;
      font-size:.76rem;
      color:#667085;
      overflow-wrap:anywhere;
    }
    .pill-row {
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin:10px 0 14px;
    }
    .pill {
      display:inline-flex;
      align-items:center;
      min-height:24px;
      padding:3px 8px;
      border-radius:999px;
      background:#eef2f7;
      color:#44515f;
      font-size:.7rem;
      font-weight:700;
      border:1px solid #d9e0ea;
    }
    #notes,
    #source {
      font-size:.76rem;
      line-height:1.45;
      color:#526070;
    }
    #notes { margin-top:8px; }
    #source {
      margin-top:14px;
      padding-top:12px;
      border-top:1px solid #e3e8ef;
      color:#7a8494;
    }
    #municipios-block {
      margin-top:18px;
      background:#ffffff;
      border:1px solid #d8dee8;
      border-radius:8px;
      padding:14px 16px;
    }
    #mun-count {
      margin-top:3px;
      color:#667085;
      font-size:.74rem;
    }
    #mun-list {
      list-style:none;
      margin-top:10px;
      display:grid;
      gap:5px;
    }
    #mun-list li {
      display:flex;
      align-items:flex-start;
      gap:7px;
      font-size:.78rem;
      color:#344054;
      line-height:1.25;
    }
    #mun-list li::before {
      content:"";
      width:6px;
      height:6px;
      margin-top:5px;
      border-radius:50%;
      background:var(--district-color, #667085);
      flex:0 0 auto;
    }
    #legend {
      max-height:40vh;
      overflow-y:auto;
      padding:14px 18px 16px;
      background:#ffffff;
      border-top:1px solid #d8dee8;
    }
    .zone + .zone { margin-top:12px; }
    .zone-title {
      color:#667085;
      font-size:.68rem;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:6px;
    }
    .chips {
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }
    .chip {
      min-width:36px;
      height:30px;
      border:1px solid #d4dbe6;
      border-bottom-width:2px;
      border-radius:7px;
      background:#f8fafc;
      color:#344054;
      font-weight:800;
      font-size:.76rem;
      cursor:pointer;
      transition:background .12s, color .12s, border-color .12s, transform .12s;
    }
    .chip:hover,
    .chip.active {
      background:var(--c);
      border-color:var(--c);
      color:#fff;
      transform:translateY(-1px);
    }
    .chip.zone-muted {
      opacity:.38;
    }
    #map-wrap {
      position:relative;
      min-width:0;
      background:#dfe5ee;
    }
    #map { height:100%; width:100%; }
    .num-label {
      width:24px;
      height:24px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      font-weight:900;
      color:#fff;
      border:2px solid rgba(255,255,255,.8);
      box-shadow:0 2px 8px rgba(15,23,42,.35);
      pointer-events:none;
      transition:transform .12s;
    }
    .num-label.big { transform:scale(1.28); }
    #loading,
    #err {
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:#ffffff;
      border:1px solid #d8dee8;
      border-radius:8px;
      padding:20px 26px;
      text-align:center;
      z-index:9999;
      box-shadow:0 14px 36px rgba(16,24,40,.14);
    }
    #loading p,
    #err p { font-size:.82rem; color:#667085; }
    #err { display:none; max-width:360px; border-color:#f0b4aa; }
    #err h3 { color:#b42318; margin-bottom:8px; }
    .spin {
      width:28px;
      height:28px;
      margin:0 auto 10px;
      border:3px solid #e3e8ef;
      border-top-color:#2563eb;
      border-radius:50%;
      animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media (max-width: 860px) {
      body { overflow:auto; }
      #app {
        height:auto;
        min-height:100vh;
        grid-template-columns:1fr;
      }
      #sidebar { min-height:58vh; border-right:0; border-bottom:1px solid #d8dee8; }
      #map-wrap { height:58vh; }
      #legend { max-height:none; }
    }
  </style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <header id="hdr">
      <h1>Marco Geografico Electoral Local</h1>
      <p>26 distritos locales electorales en Puebla</p>
    </header>

    <section id="district-panel">
      <section id="zone-overview" aria-label="Tres distritaciones"></section>

      <article id="district-hero">
        <div id="district-image-wrap">
          <img id="district-image" alt="">
          <div id="image-empty">Selecciona un distrito</div>
        </div>
        <div id="district-copy">
          <div id="district-meta">
            <div id="badge">--</div>
            <div>
              <div class="label">Distrito</div>
              <h2 id="district-title">Pasa el cursor sobre el mapa</h2>
              <div id="district-subtitle">Sin seleccion</div>
            </div>
          </div>
          <div class="pill-row" id="pill-row"></div>
          <div id="notes"></div>
          <div id="source"></div>
        </div>
      </article>

      <section id="municipios-block">
        <div class="label">Municipios</div>
        <div id="mun-count">La informacion se mostrara por distrito.</div>
        <ul id="mun-list"></ul>
      </section>
    </section>

    <nav id="legend" aria-label="Distritos">
      <div class="label">Zonas geograficas</div>
      <div id="zones"></div>
    </nav>
  </aside>

  <main id="map-wrap">
    <div id="map"></div>
    <div id="loading"><div class="spin"></div><p>Cargando mapa...</p></div>
    <div id="err"><h3>Error</h3><p id="err-txt"></p></div>
  </main>
</div>

<script>
const map = L.map('map', { center:[18.85,-97.8], zoom:8, zoomControl:true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; Carto',
  subdomains:'abcd',
  maxZoom:19
}).addTo(map);

let geoLayer = null;
let districtDetails = {};
let distLayers = {};
let distColors = {};
let distZones = {};
let zoneDetails = {};
let selectedZone = 'Puebla Centro';
let labels = {};
let activeNum = null;
let selectedNum = null;

const sBase = f => ({
  fillColor:f.properties.zona_color || f.properties.distrito_color,
  fillOpacity:.36,
  color:'#ffffff',
  weight:.85,
  opacity:.95
});
const sActive = f => ({
  fillColor:f.properties.distrito_color,
  fillOpacity:.86,
  color:'#111827',
  weight:2.4,
  opacity:1
});
const sDim = f => ({
  fillColor:f.properties.zona_color || f.properties.distrito_color,
  fillOpacity:.08,
  color:'#ffffff',
  weight:.45,
  opacity:.45
});
const sZone = (f, zone) => {
  const same = f.properties.distrito_zona === zone;
  return {
    fillColor:f.properties.zona_color || f.properties.distrito_color,
    fillOpacity:same ? .64 : .14,
    color:same ? '#111827' : '#ffffff',
    weight:same ? 1.8 : .45,
    opacity:same ? 1 : .5
  };
};

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#039;'
  }[ch]));
}

function districtBounds(num) {
  const layers = distLayers[num] || [];
  return layers.reduce((bounds, layer) => bounds.extend(layer.getBounds()), L.latLngBounds([]));
}

function zoneBounds(zone) {
  const detail = zoneDetails[zone];
  const nums = detail ? detail.numeros : [];
  return nums.reduce((bounds, num) => {
    (distLayers[num] || []).forEach(layer => bounds.extend(layer.getBounds()));
    return bounds;
  }, L.latLngBounds([]));
}

function buildZoneOverview(distritos) {
  const order = ['Región Norte', 'Puebla Centro', 'Región Sur'];
  const zones = {};
  distritos.forEach(d => {
    if (!zones[d.zona]) zones[d.zona] = { color:d.zona_color, distritos:[] };
    zones[d.zona].distritos.push(d);
  });
  zoneDetails = Object.fromEntries(Object.entries(zones).map(([name, z]) => [
    name,
    {
      color:z.color,
      numeros:z.distritos.map(d => d.numero),
      distritos:z.distritos,
    }
  ]));

  const wrap = document.getElementById('zone-overview');
  wrap.innerHTML = '';
  order.filter(name => zones[name]).forEach(name => {
    const z = zones[name];
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'zone-card';
    button.dataset.zone = name;
    button.style.setProperty('--zc', z.color);
    button.innerHTML = `
      <span class="zone-swatch"></span>
      <span class="zone-card-main">
        <span class="zone-name">${escapeHtml(name)}</span>
        <span class="zone-districts">Distritos ${escapeHtml(z.distritos.map(d => d.numero).join(', '))}</span>
      </span>
      <span class="zone-total">${z.distritos.length}</span>
    `;
    button.addEventListener('mouseenter', () => activateZone(name, false));
    button.addEventListener('click', () => selectZone(name));
    wrap.appendChild(button);
  });
}

function activateZone(zone, updatePanel=true) {
  if (!zone || !geoLayer) return;
  selectedZone = zone;
  selectedNum = null;
  activeNum = null;
  geoLayer.eachLayer(layer => {
    layer.setStyle(sZone(layer.feature, zone));
    if (layer.feature.properties.distrito_zona === zone) layer.bringToFront();
  });
  document.querySelectorAll('.zone-card').forEach(card => {
    card.classList.toggle('active', card.dataset.zone === zone);
  });
  document.querySelectorAll('.chip').forEach(chip => {
    const num = parseInt(chip.dataset.num);
    chip.classList.remove('active');
    chip.classList.toggle('zone-muted', distZones[num] !== zone);
  });
  Object.entries(labels).forEach(([labelNum, marker]) => {
    const el = marker.getElement()?.querySelector('.num-label');
    if (el) el.classList.toggle('big', distZones[parseInt(labelNum)] === zone);
  });
  if (updatePanel) showZoneSummary(zone);
}

function selectZone(zone) {
  activateZone(zone);
  const bounds = zoneBounds(zone);
  if (bounds.isValid()) map.fitBounds(bounds, { padding:[42,42] });
}

function showZoneSummary(zone) {
  const z = zoneDetails[zone];
  if (!z) return;
  const color = z.color || '#667085';
  document.documentElement.style.setProperty('--district-color', color);
  document.getElementById('badge').textContent = z.distritos.length;
  document.getElementById('badge').style.background = color;
  document.getElementById('district-title').textContent = zone;
  document.getElementById('district-subtitle').textContent = `Distritos ${z.numeros.join(', ')}`;
  document.getElementById('pill-row').innerHTML = `<span class="pill">Distritacion regional</span><span class="pill">${z.distritos.length} distritos</span>`;
  document.getElementById('notes').innerHTML = zone === 'Puebla Centro'
    ? '<p>Zona prioritaria de la presentacion: concentra los distritos 7, 8, 9, 10, 11, 12, 16, 17, 18, 19 y 20.</p>'
    : '<p>Selecciona un distrito dentro de esta zona para ver su ficha e imagen correspondiente.</p>';
  document.getElementById('source').textContent = 'Zonas geograficas tomadas de la presentacion de Marco Geografico Electoral Local, julio de 2026.';
  const image = document.getElementById('district-image');
  const empty = document.getElementById('image-empty');
  image.removeAttribute('src');
  image.style.display = 'none';
  empty.textContent = zone === 'Puebla Centro' ? 'Puebla Centro seleccionado' : zone;
  empty.style.display = 'block';
  document.getElementById('mun-count').textContent = `Distritos de ${zone}`;
  document.getElementById('mun-list').innerHTML = z.distritos
    .map(d => `<li>Distrito ${d.numero} - ${escapeHtml(d.nombre)}</li>`)
    .join('');
}

function activateDistrict(num) {
  if (num == null || !geoLayer) return;
  activeNum = num;
  const d = districtDetails[num];
  const zone = distZones[num] || d?.zona;
  const hasGeometry = (distLayers[num] || []).length > 0;
  const color = distColors[num] || d?.color || '#667085';
  document.documentElement.style.setProperty('--district-color', color);

  geoLayer.eachLayer(layer => {
    const same = hasGeometry
      ? layer.feature.properties.distrito_numero === num
      : layer.feature.properties.distrito_zona === zone;
    layer.setStyle(same ? sActive(layer.feature) : sDim(layer.feature));
    if (same) layer.bringToFront();
  });

  document.querySelectorAll('.chip').forEach(chip => {
    chip.classList.toggle('active', parseInt(chip.dataset.num) === num);
    chip.classList.remove('zone-muted');
  });
  document.querySelectorAll('.zone-card').forEach(card => {
    card.classList.toggle('active', card.dataset.zone === zone);
  });
  Object.entries(labels).forEach(([labelNum, marker]) => {
    const el = marker.getElement()?.querySelector('.num-label');
    if (el) el.classList.toggle('big', parseInt(labelNum) === num);
  });
}

function resetDistrict() {
  if (selectedNum != null) {
    activateDistrict(selectedNum);
    showDistrict(selectedNum);
    return;
  }
  if (selectedZone) {
    activateZone(selectedZone);
    return;
  }
  activeNum = null;
  if (geoLayer) geoLayer.eachLayer(layer => geoLayer.resetStyle(layer));
  document.querySelectorAll('.chip').forEach(chip => chip.classList.remove('active'));
  Object.values(labels).forEach(marker => {
    marker.getElement()?.querySelector('.num-label')?.classList.remove('big');
  });
}

function showDistrict(num) {
  const d = districtDetails[num];
  if (!d) return;
  const color = d.color || '#667085';
  document.documentElement.style.setProperty('--district-color', color);

  document.getElementById('badge').textContent = d.numero;
  document.getElementById('badge').style.background = color;
  document.getElementById('district-title').textContent = `Distrito ${d.numero}`;
  document.getElementById('district-subtitle').textContent = d.nombre || 'Sin cabecera';

  const pills = [d.zona, d.division].filter(Boolean);
  document.getElementById('pill-row').innerHTML = pills.map(p => `<span class="pill">${escapeHtml(p)}</span>`).join('');

  const notes = d.notas || [];
  document.getElementById('notes').innerHTML = notes.length
    ? notes.map(n => `<p>${escapeHtml(n)}</p>`).join('')
    : '<p>Informacion distrital base.</p>';
  document.getElementById('source').textContent = d.fuente || '';

  const municipios = (d.municipios_ppt && d.municipios_ppt.length) ? d.municipios_ppt : (d.municipios || []);
  document.getElementById('mun-count').textContent = `${municipios.length} municipio${municipios.length === 1 ? '' : 's'} registrado${municipios.length === 1 ? '' : 's'}`;
  document.getElementById('mun-list').innerHTML = municipios.map(m => `<li>${escapeHtml(m)}</li>`).join('');

  const image = document.getElementById('district-image');
  const empty = document.getElementById('image-empty');
  if (d.imagen) {
    image.src = d.imagen;
    image.alt = `Mapa del distrito ${d.numero}`;
    image.style.display = 'block';
    empty.style.display = 'none';
  } else {
    image.removeAttribute('src');
    image.style.display = 'none';
    empty.style.display = 'block';
  }
}

function selectDistrict(num, shouldZoom=true) {
  if (num == null) return;
  selectedNum = num;
  selectedZone = distZones[num] || selectedZone;
  activateDistrict(num);
  showDistrict(num);
  if (shouldZoom) {
    const bounds = districtBounds(num);
    if (bounds.isValid()) map.fitBounds(bounds, { padding:[36,36] });
  }
}

function buildLegend(distritos) {
  const zones = {};
  distritos.forEach(d => {
    if (!zones[d.zona]) zones[d.zona] = [];
    zones[d.zona].push(d);
  });

  const zoneOrder = ['Región Norte', 'Puebla Centro', 'Región Sur', 'Sin zona'];
  const wrap = document.getElementById('zones');
  wrap.innerHTML = '';
  zoneOrder.filter(z => zones[z]).forEach(zone => {
    const section = document.createElement('section');
    section.className = 'zone';

    const title = document.createElement('div');
    title.className = 'zone-title';
    title.textContent = zone;
    section.appendChild(title);

    const chips = document.createElement('div');
    chips.className = 'chips';
    zones[zone].forEach(d => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'chip';
      button.dataset.num = d.numero;
      button.style.setProperty('--c', d.color);
      button.textContent = d.numero;
      button.title = `Distrito ${d.numero} - ${d.nombre}`;
      button.addEventListener('mouseenter', () => {
        activateDistrict(d.numero);
        showDistrict(d.numero);
      });
      button.addEventListener('click', () => selectDistrict(d.numero));
      chips.appendChild(button);
    });

    section.appendChild(chips);
    wrap.appendChild(section);
  });
}

function addLabels() {
  const acc = {};
  geoLayer.eachLayer(layer => {
    const n = layer.feature.properties.distrito_numero;
    if (n == null) return;
    const c = layer.getBounds().getCenter();
    if (!acc[n]) acc[n] = { lat:0, lng:0, cnt:0 };
    acc[n].lat += c.lat;
    acc[n].lng += c.lng;
    acc[n].cnt += 1;
  });

  Object.entries(acc).forEach(([num, a]) => {
    if (!a.cnt) return;
    const n = parseInt(num);
    const color = distColors[n] || '#667085';
    const center = L.latLng(a.lat / a.cnt, a.lng / a.cnt);
    const icon = L.divIcon({
      className:'',
      html:`<div class="num-label" style="background:${color}">${n}</div>`,
      iconSize:[24,24],
      iconAnchor:[12,12]
    });
    const marker = L.marker(center, { icon, interactive:false, zIndexOffset:1000 });
    marker.addTo(map);
    labels[n] = marker;
  });
}

async function load() {
  try {
    const [dRes, gRes] = await Promise.all([
      fetch('/api/distritos/'),
      fetch('/api/geojson/')
    ]);
    if (!dRes.ok) throw new Error('No se pudo cargar el catalogo de distritos.');
    if (!gRes.ok) {
      const e = await gRes.json();
      throw new Error(e.error || 'No se pudo cargar el GeoJSON.');
    }

    const distritos = await dRes.json();
    const data = await gRes.json();
    districtDetails = Object.fromEntries(distritos.map(d => [d.numero, d]));
    distritos.forEach(d => {
      distZones[d.numero] = d.zona;
      distColors[d.numero] = d.color;
    });
    buildZoneOverview(distritos);
    buildLegend(distritos);

    geoLayer = L.geoJSON(data, {
      style:sBase,
      onEachFeature(feat, layer) {
        const num = feat.properties.distrito_numero;
        if (num != null) {
          if (!distLayers[num]) distLayers[num] = [];
          distLayers[num].push(layer);
          distColors[num] = feat.properties.distrito_color;
          distZones[num] = feat.properties.distrito_zona;
        }
        layer.on({
          mouseover() {
            activateDistrict(num);
            showDistrict(num);
          },
          click() {
            selectDistrict(num);
          }
        });
      }
    }).addTo(map);

    addLabels();
    selectZone('Puebla Centro');
    document.getElementById('loading').style.display = 'none';
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('err-txt').textContent = e.message;
    document.getElementById('err').style.display = 'block';
    console.error(e);
  }
}

map.on('click', event => {
  if (!event.originalEvent.target.closest('.leaflet-interactive')) {
    selectedNum = null;
    selectedZone = 'Puebla Centro';
    selectZone(selectedZone);
  }
});

load();
</script>
</body>
</html>
