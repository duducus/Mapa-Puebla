<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Puebla – Distritos Electorales</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI',system-ui,sans-serif; display:flex; height:100vh; background:#0f1117; color:#e8eaf0; }

    /* Sidebar */
    #sidebar { width:260px; flex-shrink:0; display:flex; flex-direction:column; background:#1a1d27; border-right:1px solid #2d3044; overflow:hidden; }

    #hdr { padding:14px 16px 10px; border-bottom:1px solid #2d3044; }
    #hdr h1 { font-size:.95rem; font-weight:600; color:#fff; }
    #hdr p  { font-size:.68rem; color:#5a5f7a; margin-top:2px; }

    /* Info */
    #info { padding:12px 16px; border-bottom:1px solid #2d3044; min-height:108px; }
    .lbl { font-size:.58rem; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:#4a4f6a; margin-bottom:2px; }
    #info-mun { font-size:.9rem; font-weight:600; color:#fff; min-height:20px; margin-bottom:8px; }
    #dist-row { display:flex; align-items:center; gap:9px; }
    #badge {
      width:30px; height:30px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:.78rem; font-weight:800; color:#fff;
      background:#2d3044; border:2px solid #3d4260; transition:background .15s;
    }
    #dist-nombre { font-size:.8rem; color:#9095b0; }

    /* Lista */
    #mun-wrap { flex:1; overflow-y:auto; padding:10px 16px; }
    #mun-lbl { font-size:.58rem; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:#4a4f6a; margin-bottom:5px; }
    #mun-list { list-style:none; }
    #mun-list li { font-size:.73rem; padding:3px 0; border-bottom:1px solid #1f2235; color:#7a7f9a; display:flex; align-items:center; gap:5px; }
    #mun-list li::before { content:''; width:4px; height:4px; border-radius:50%; background:#2d3044; flex-shrink:0; }
    #mun-list li.cur { color:#fff; font-weight:600; }
    #mun-list li.cur::before { background:#6c72ff; }

    /* Leyenda: grid de 26 chips */
    #legend { border-top:1px solid #2d3044; padding:10px 16px; overflow-y:auto; max-height:200px; }
    #chips { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
    .chip {
      display:flex; align-items:center; gap:4px;
      font-size:.65rem; font-weight:700; color:#c5c8dc;
      padding:3px 7px; border-radius:10px;
      border:1.5px solid transparent; background:#1f2235;
      cursor:pointer; transition:all .12s;
    }
    .chip .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .chip:hover  { background:#23263a; border-color:var(--c); }
    .chip.active { background:var(--c); border-color:var(--c); color:#fff; }

    /* Mapa */
    #map { flex:1; }

    /* Etiqueta de número en el mapa */
    .num-label {
      width:20px; height:20px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:8px; font-weight:900; color:#fff;
      border:1.5px solid rgba(255,255,255,.45);
      box-shadow:0 1px 5px rgba(0,0,0,.7);
      pointer-events:none;
      transition:transform .12s;
    }
    .num-label.big { width:26px; height:26px; font-size:10px; transform:scale(1.2); }

    /* Loader / error */
    #loading { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#1a1d27ee; border:1px solid #2d3044; border-radius:10px; padding:20px 28px; text-align:center; z-index:9999; pointer-events:none; }
    .spin { width:28px; height:28px; margin:0 auto 10px; border:3px solid #2d3044; border-top-color:#6c72ff; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin{to{transform:rotate(360deg)}}
    #loading p { font-size:.78rem; color:#9095b0; }
    #err { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#2a1a1a; border:1px solid #c0392b; border-radius:10px; padding:20px 28px; text-align:center; z-index:9999; display:none; max-width:340px; }
    #err h3 { color:#e74c3c; margin-bottom:8px; }
    #err p { font-size:.78rem; color:#9095b0; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="hdr">
    <h1>Puebla · Distritos Electorales</h1>
    <p>26 distritos locales · 217 municipios</p>
  </div>

  <div id="info">
    <div class="lbl">Municipio</div>
    <div id="info-mun">Pasa el cursor sobre el mapa</div>
    <div id="dist-row">
      <div id="badge">—</div>
      <div id="dist-nombre" style="color:#4a4f6a">Sin selección</div>
    </div>
  </div>

  <div id="mun-wrap">
    <div id="mun-lbl"></div>
    <ul id="mun-list"></ul>
  </div>

  <div id="legend">
    <div class="lbl">Distritos</div>
    <div id="chips"></div>
  </div>
</div>

<div id="map"></div>
<div id="loading"><div class="spin"></div><p>Cargando mapa…</p></div>
<div id="err"><h3>Error</h3><p id="err-txt"></p></div>

<script>
const map = L.map('map', { center:[18.85,-97.8], zoom:8 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © Carto', subdomains:'abcd', maxZoom:19
}).addTo(map);

let geoLayer   = null;
let distLayers = {};   // num → [layer,…]
let distColors = {};   // num → color
let distNames  = {};   // num → nombre cabecera
let labels     = {};   // num → marker
let activeNum  = null;
let dimTimer   = null;

// Estilos
const sBase   = f => ({ fillColor: f.properties.distrito_color, fillOpacity:.55, color:'#0a0c14', weight:.7 });
const sHover  = f => ({ fillColor: f.properties.distrito_color, fillOpacity:.9,  color:'#fff',    weight:2 });
const sDim    = f => ({ fillColor: f.properties.distrito_color, fillOpacity:.12, color:'#0a0c14', weight:.3 });

function activate(num) {
  if (dimTimer) { clearTimeout(dimTimer); dimTimer = null; }
  if (activeNum === num) return;
  activeNum = num;
  geoLayer.eachLayer(l => {
    l.setStyle(l.feature.properties.distrito_numero === num ? sHover(l.feature) : sDim(l.feature));
    if (l.feature.properties.distrito_numero === num) l.bringToFront();
  });
  document.querySelectorAll('.chip').forEach(c =>
    c.classList.toggle('active', parseInt(c.dataset.num) === num));
  Object.entries(labels).forEach(([n, mk]) => {
    const el = mk.getElement()?.querySelector('.num-label');
    if (el) el.classList.toggle('big', parseInt(n) === num);
  });
}

function deactivate() {
  dimTimer = setTimeout(() => {
    activeNum = null;
    if (geoLayer) geoLayer.eachLayer(l => geoLayer.resetStyle(l));
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    Object.values(labels).forEach(mk => {
      mk.getElement()?.querySelector('.num-label')?.classList.remove('big');
    });
    resetInfo();
    dimTimer = null;
  }, 80);
}

function showInfo(p) {
  const c = p.distrito_color || '#555';
  document.getElementById('info-mun').textContent = p.mun_nombre || '—';
  document.getElementById('badge').textContent    = p.distrito_numero ?? '—';
  document.getElementById('badge').style.cssText  = `background:${c};border-color:${c}`;
  document.getElementById('dist-nombre').textContent = `D${p.distrito_numero} · ${p.distrito_nombre}`;
  document.getElementById('dist-nombre').style.color = '#e8eaf0';
  const muns = p.municipios_distrito || [];
  document.getElementById('mun-lbl').textContent =
    muns.length ? `Municipios del distrito (${muns.length})` : '';
  document.getElementById('mun-list').innerHTML = muns.map(m =>
    `<li class="${m === p.mun_nombre ? 'cur' : ''}">${m}</li>`).join('');
}

function resetInfo() {
  document.getElementById('info-mun').textContent      = 'Pasa el cursor sobre el mapa';
  document.getElementById('badge').textContent         = '—';
  document.getElementById('badge').style.cssText       = 'background:#2d3044;border-color:#3d4260';
  document.getElementById('dist-nombre').textContent   = 'Sin selección';
  document.getElementById('dist-nombre').style.color   = '#4a4f6a';
  document.getElementById('mun-lbl').textContent       = '';
  document.getElementById('mun-list').innerHTML        = '';
}

function buildLegend(distritos) {
  const wrap = document.getElementById('chips');
  wrap.innerHTML = '';
  distritos.forEach(d => {
    const el = document.createElement('span');
    el.className = 'chip';
    el.dataset.num = d.numero;
    el.style.setProperty('--c', d.color);
    el.innerHTML = `<span class="dot" style="background:${d.color}"></span>${d.numero}`;
    el.title = d.nombre;
    el.addEventListener('click', () => {
      const num = d.numero;
      if (activeNum === num) { deactivate(); return; }
      if (dimTimer) { clearTimeout(dimTimer); dimTimer = null; }
      activate(num);
      const ls = distLayers[num] || [];
      if (ls[0]) showInfo(ls[0].feature.properties);
      const bounds = ls.reduce((b, l) => b.extend(l.getBounds()), L.latLngBounds([]));
      if (bounds.isValid()) map.fitBounds(bounds, { padding:[40,40] });
    });
    wrap.appendChild(el);
  });
}

function addLabels() {
  // Centroide = promedio de centros de bounding-box de cada municipio
  const acc = {};
  geoLayer.eachLayer(l => {
    const n = l.feature.properties.distrito_numero;
    if (n == null) return;
    const c = l.getBounds().getCenter();
    if (!acc[n]) acc[n] = { lat:0, lng:0, cnt:0 };
    acc[n].lat += c.lat; acc[n].lng += c.lng; acc[n].cnt++;
  });
  Object.entries(acc).forEach(([num, a]) => {
    if (a.cnt === 0) return;
    const n      = parseInt(num);
    const color  = distColors[n] || '#555';
    const center = L.latLng(a.lat/a.cnt, a.lng/a.cnt);
    const icon   = L.divIcon({
      className: '',
      html: `<div class="num-label" style="background:${color}dd">${n}</div>`,
      iconSize:[20,20], iconAnchor:[10,10],
    });
    const mk = L.marker(center, { icon, interactive:false, zIndexOffset:1000 });
    mk.addTo(map);
    labels[n] = mk;
  });
}

async function load() {
  try {
    const [dRes, gRes] = await Promise.all([
      fetch('/api/distritos/'), fetch('/api/geojson/')
    ]);
    if (!gRes.ok) { const e = await gRes.json(); throw new Error(e.error); }
    const distritos = await dRes.json();
    const data      = await gRes.json();

    buildLegend(distritos);
    document.getElementById('loading').style.display = 'none';

    geoLayer = L.geoJSON(data, {
      style: sBase,
      onEachFeature(feat, layer) {
        const num = feat.properties.distrito_numero;
        if (num != null) {
          if (!distLayers[num]) distLayers[num] = [];
          distLayers[num].push(layer);
          distColors[num] = feat.properties.distrito_color;
          distNames[num]  = feat.properties.distrito_nombre;
        }
        layer.on({
          mouseover() {
            if (dimTimer) { clearTimeout(dimTimer); dimTimer = null; }
            activate(num);
            showInfo(feat.properties);
          },
          mouseout: deactivate,
          click() {
            const ls = distLayers[num] || [layer];
            const b  = ls.reduce((b,l) => b.extend(l.getBounds()), L.latLngBounds([]));
            if (b.isValid()) map.fitBounds(b, { padding:[40,40] });
          },
        });
      },
    }).addTo(map);

    addLabels();
    map.fitBounds(geoLayer.getBounds(), { padding:[10,10] });

  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('err-txt').textContent = e.message;
    document.getElementById('err').style.display = 'block';
    console.error(e);
  }
}

load();
</script>
</body>
</html>
